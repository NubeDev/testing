<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todos</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 0 16px; }
    h1 { font-size: 1.5rem; }
    #add-form { display: flex; gap: 8px; margin-bottom: 16px; }
    #todo-input { flex: 1; padding: 8px; font-size: 1rem; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 8px 16px; font-size: 1rem; cursor: pointer; border: none; background: #0070f3; color: #fff; border-radius: 4px; }
    button:hover { background: #005bb5; }
    #todo-list { list-style: none; padding: 0; }
    #todo-list li { padding: 10px 12px; border: 1px solid #e5e5e5; border-radius: 4px; margin-bottom: 8px; }
    #error { color: red; margin-bottom: 8px; }
  </style>
</head>
<body>
  <h1>Todos</h1>
  <p id="error" hidden></p>
  <form id="add-form">
    <input id="todo-input" type="text" placeholder="New todo..." required>
    <button type="submit">Add</button>
  </form>
  <ul id="todo-list"></ul>
  <script src="app.js"></script>
</body>
</html>
